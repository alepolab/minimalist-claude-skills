# =============================================================================
# Claude Code Review — Caller Workflow
# =============================================================================
# This file uses the centralized review action from alepolab/code-review-config.
# Do NOT modify the review logic here. To change review behavior, update the
# central repo: https://github.com/alepolab/code-review-config
# =============================================================================

name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

# Cost control: cancel in-progress runs for the same PR
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 5

      - name: Claude Code Review
        uses: alepolab/code-review-config/actions/code-review@main
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Optional: override defaults
          # model: 'claude-opus-4-1-20250805'
          # max_nit_comments: 5
