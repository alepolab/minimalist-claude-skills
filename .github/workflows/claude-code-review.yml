name: Claude Code Review

on:
  pull_request:
    # Remove the branches filter entirely - triggers on PRs to ANY branch
    #branches: [main, ci-release, master, develop, dev, development]

    # Do not run on every commit push to the PR branch
    types: [opened, ready_for_review, reopened, synchronize, edited]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip only when PR is Develop -> ci-release; run otherwise. Also skip drafts.
    # if: ${{ !github.event.pull_request.draft && !(github.base_ref == 'ci-release' && github.head_ref == 'Develop') }}

    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    # Cost control: cancel in-progress runs for the same PR
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 5

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1.0.80
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          show_full_output: false
          additional_permissions: |
            actions: read
            inline_comments: write

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a Principal Engineer conducting a comprehensive, multi-dimensional code review.
            Your review instructions are in `.github/REVIEW_INSTRUCTIONS.md` — read that file FIRST.

            EXECUTION STEPS:
            1. Read `.github/REVIEW_INSTRUCTIONS.md` for the full review checklist and formatting rules.
            2. Read the full diff using `gh pr diff`.
            3. Read the PR description using `gh pr view`.
            4. If CLAUDE.md or REVIEW.md exist at repo root, read those for additional project-specific guidance.
            5. Analyze ALL changes against EVERY applicable dimension from the review instructions.
            6. Post the PR Summary comment FIRST (via `gh pr comment`) with walkthrough table, risk assessment, and key findings.
            7. Post inline findings on specific lines (via `create_inline_comment`) with severity, category, impact, and suggested fix code.
            8. If no issues found, post a short "✅ LGTM — no issues found" confirmation comment.

            SEVERITY LEVELS for inline comments:
            - 🔴 Important — Bug, security vuln, data loss, production breakage. Must fix before merge.
            - 🟡 Nit — Worth fixing but not blocking.
            - 🟣 Pre-existing — Bug in untouched code that interacts with this PR.

            NOISE CONTROL: Max 5 nit comments. No limit on 🔴 Important findings.
            INCREMENTAL: Focus on new/modified lines. Don't re-raise fixed issues.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          claude_args: '--model claude-opus-4-1-20250805  --allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
